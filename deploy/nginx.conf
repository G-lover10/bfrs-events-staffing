# /etc/nginx/sites-available/bfrs-api
# Symlink into sites-enabled, then `nginx -t && systemctl reload nginx`.
# Placeholder __HOSTNAME__ is replaced by bootstrap.sh with the server's
# sslip.io hostname (e.g. 178-156-227-13.sslip.io).

# Rate limit API calls per client IP (10 req/s with a small burst).
limit_req_zone $binary_remote_addr zone=bfrs_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name __HOSTNAME__;

    # certbot --nginx will own this block once TLS is provisioned.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __HOSTNAME__;

    # certbot --nginx fills in ssl_certificate / ssl_certificate_key here.

    # Security headers (kept minimal — the SPA still lives on Netlify, so CSP
    # is owned there. These only affect direct API responses.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Health check (open, no rate limit) — used by GitHub Actions and uptime monitors.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # All real API traffic enters here. Netlify's edge proxy rewrite hits these
    # paths after the cutover.
    location /api/ {
        limit_req zone=bfrs_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Anything else gets a 404 — this server only exists to serve the API.
    location / {
        return 404;
    }
}
