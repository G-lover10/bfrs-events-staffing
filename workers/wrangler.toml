name = "bfrs-api"
main = "src/index.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPABASE_URL = "https://tohhqssnngvavkkeqzfl.supabase.co"
KEEPALIVE_KEY = "bfrs-keepalive-2026"
ENABLE_CHATBOT = "true"
ALLOWED_ORIGINS = "https://bfrs-events-staffing.netlify.app,http://localhost:5173"
AUTH_MODE = "shadow"

# AUTH_MODE values:
#   "shadow"  — logs missing/invalid auth but returns 200 (use during cutover)
#   "enforce" — returns 401 on missing/invalid auth (use after cutover verified)
#
# Secrets — set via `wrangler secret put <NAME>`:
#   GROQ_KEY              Groq API key for chatbot
#   RESEND_KEY            Resend API key for send-email
#   SUPABASE_SERVICE_KEY  Supabase service role key for keep-alive + pay-period-report
