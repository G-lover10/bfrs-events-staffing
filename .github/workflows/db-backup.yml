name: DB Backup

on:
  schedule:
    - cron: "0 7 * * *"  # 02:00 America/Chicago (07:00 UTC) every day
  workflow_dispatch:     # also allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Dump Supabase tables to JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup-db.mjs

      - name: Commit backup
        run: |
          if [ -z "$(git status --porcelain backups/)" ]; then
            echo "No changes — DB unchanged since last backup."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "DB backup $(date -u +%Y-%m-%d)"
          git push
