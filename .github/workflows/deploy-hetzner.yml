name: Deploy API to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/deploy.sh'
      - '.github/workflows/deploy-hetzner.yml'
  workflow_dispatch:

concurrency:
  group: hetzner-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Deploy
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: ./deploy/deploy.sh

      - name: Smoke test public endpoint
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "https://$HETZNER_HOST/healthz" >/dev/null; then
              echo "Public healthz OK"
              exit 0
            fi
            sleep 3
          done
          echo "Public healthz failed after deploy"
          exit 1
