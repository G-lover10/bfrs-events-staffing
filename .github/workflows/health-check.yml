name: BFRS Daily Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours: 02:00, 08:00, 14:00, 20:00 America/Chicago
  workflow_dispatch:        # Allow manual trigger anytime

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check App is Live
        id: app_check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://bfrs-events-staffing.netlify.app")
          echo "app_status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "APP_DOWN=true" >> $GITHUB_ENV
            echo "❌ App is DOWN - HTTP $STATUS"
          else
            echo "✅ App is live - HTTP $STATUS"
          fi

      - name: Ping Keep-Alive (replaces cron-job.org)
        run: |
          RESULT=$(curl -s "https://bfrs-events-staffing.netlify.app/.netlify/functions/keep-alive?key=bfrs-keepalive-2026")
          echo "Keep-alive result: $RESULT"
          if echo "$RESULT" | grep -q '"alive":true'; then
            echo "✅ Database is awake and responding"
          else
            echo "⚠️ Keep-alive check failed: $RESULT"
            echo "DB_ISSUE=true" >> $GITHUB_ENV
          fi

      - name: Check Supabase Status
        run: |
          STATUS=$(curl -s "https://www.supabasestatus.com/api/v2/status.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status']['indicator'])" 2>/dev/null || echo "unknown")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" != "none" ] && [ "$STATUS" != "unknown" ]; then
            echo "SUPABASE_ISSUE=true" >> $GITHUB_ENV
            echo "SUPABASE_STATUS=$STATUS" >> $GITHUB_ENV
            echo "⚠️ Supabase reporting: $STATUS"
          else
            echo "✅ Supabase operational"
          fi

      - name: Check Netlify Status
        run: |
          STATUS=$(curl -s "https://www.netlifystatus.com/api/v2/status.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status']['indicator'])" 2>/dev/null || echo "unknown")
          echo "Netlify status: $STATUS"
          if [ "$STATUS" != "none" ] && [ "$STATUS" != "unknown" ]; then
            echo "NETLIFY_ISSUE=true" >> $GITHUB_ENV
            echo "NETLIFY_STATUS=$STATUS" >> $GITHUB_ENV
            echo "⚠️ Netlify reporting: $STATUS"
          else
            echo "✅ Netlify operational"
          fi

      - name: Check Postgres Deprecation Deadline
        run: |
          TODAY=$(date +%Y-%m-%d)
          DEADLINE="2026-07-01"
          DAYS_LEFT=$(python3 -c "from datetime import date; print((date.fromisoformat('$DEADLINE') - date.fromisoformat('$TODAY')).days)")
          echo "Days until Postgres 14 deadline: $DAYS_LEFT"
          if [ "$DAYS_LEFT" -lt 30 ]; then
            echo "PG_URGENT=true" >> $GITHUB_ENV
            echo "PG_DAYS=$DAYS_LEFT" >> $GITHUB_ENV
            echo "⚠️ URGENT: Only $DAYS_LEFT days until Postgres 14 deprecated!"
          elif [ "$DAYS_LEFT" -lt 60 ]; then
            echo "PG_WARNING=true" >> $GITHUB_ENV
            echo "PG_DAYS=$DAYS_LEFT" >> $GITHUB_ENV
            echo "⚠️ Warning: $DAYS_LEFT days until Postgres 14 deadline"
          else
            echo "✅ Postgres deadline: $DAYS_LEFT days away"
          fi

      - name: Send Alert Email if Issues Found
        if: env.APP_DOWN == 'true' || env.DB_ISSUE == 'true' || env.SUPABASE_ISSUE == 'true' || env.NETLIFY_ISSUE == 'true' || env.PG_URGENT == 'true' || env.PG_WARNING == 'true'
        run: |
          ISSUES=""
          [ "$APP_DOWN" == "true" ] && ISSUES="$ISSUES<li style='color:red'>❌ <strong>App is DOWN</strong> — bfrs-events-staffing.netlify.app not responding</li>"
          [ "$DB_ISSUE" == "true" ] && ISSUES="$ISSUES<li style='color:red'>❌ <strong>Database keep-alive failed</strong> — Supabase may be sleeping</li>"
          [ "$SUPABASE_ISSUE" == "true" ] && ISSUES="$ISSUES<li style='color:orange'>⚠️ <strong>Supabase incident</strong> — Status: $SUPABASE_STATUS — check supabasestatus.com</li>"
          [ "$NETLIFY_ISSUE" == "true" ] && ISSUES="$ISSUES<li style='color:orange'>⚠️ <strong>Netlify incident</strong> — Status: $NETLIFY_STATUS — check netlifystatus.com</li>"
          [ "$PG_URGENT" == "true" ] && ISSUES="$ISSUES<li style='color:red'>🚨 <strong>URGENT: Postgres 14 deprecated in $PG_DAYS days</strong> — Upgrade NOW at Supabase → Settings → Infrastructure or app will go down July 1</li>"
          [ "$PG_WARNING" == "true" ] && ISSUES="$ISSUES<li style='color:orange'>⚠️ <strong>Postgres 14 deadline in $PG_DAYS days</strong> — Plan upgrade soon at Supabase → Settings → Infrastructure</li>"

          curl -s -X POST "https://bfrs-events-staffing.netlify.app/.netlify/functions/send-email" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SYSTEM_TOKEN }}" \
            -d "{
              \"to\": [\"grabcalls@gmail.com\"],
              \"subject\": \"🚨 BFRS App Alert — Action Required\",
              \"html\": \"<div style='font-family:Arial,sans-serif;padding:20px'><h2 style='color:#dc2626'>🔥 BFRS System Alert</h2><p>The following issues were detected during the daily health check:</p><ul>$ISSUES</ul><p style='margin-top:20px'><a href='https://bfrs-events-staffing.netlify.app' style='background:#dc2626;color:white;padding:10px 20px;text-decoration:none;border-radius:6px'>Open App</a></p><p style='color:#888;font-size:12px;margin-top:16px'>Daily health check run by GitHub Actions · $(date)</p></div>\"
            }"
          echo "Alert email sent to grabcalls@gmail.com"

      - name: Summary
        run: |
          echo "================================"
          echo "BFRS Daily Health Check Complete"
          echo "================================"
          echo "App: ${{ steps.app_check.outputs.app_status }}"
          echo "Time: $(date)"
          echo "All checks passed if no alert was sent"
